<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Open Pool — Royal Birkdale 2026</title>
<link rel="icon" type="image/png" href="/images/claret-jug-navy-400.png">
<style>
  :root {
    --navy: #14243e;
    --navy-light: #1f3557;
    --cream: #f5f2e8;
    --gold: #b99a45;
    --line: #d8d2c0;
    --warn-bg: #fdf3e4;
    --warn-border: #eccf9e;
    --warn-text: #8a4a12;
    --ok: #1d6b3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--navy);
    font-family: Georgia, "Times New Roman", serif;
  }

  /* ---------- header ---------- */
  header {
    background: var(--navy);
    color: var(--cream);
    padding: 18px 16px 14px 16px;
    text-align: center;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .logo-jug { height: 74px; width: auto; }
  .logo-text { text-align: left; }
  .logo-text h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: 3px;
    font-weight: normal;
  }
  .logo-text .sub {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ---------- tabs ---------- */
  nav {
    display: flex;
    background: var(--navy-light);
    justify-content: center;
  }
  nav button {
    background: none;
    border: none;
    color: var(--cream);
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 14px 22px;
    cursor: pointer;
    opacity: 0.7;
    border-bottom: 3px solid transparent;
    min-height: 48px;
  }
  nav button.active {
    opacity: 1;
    border-bottom-color: var(--gold);
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 22px 14px 60px 14px;
  }
  .tab { display: none; }
  .tab.active { display: block; }
  h2 {
    font-weight: normal;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 6px;
  }

  /* ---------- leaderboard ---------- */
  table.board {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }
  table.board th {
    background: var(--navy);
    color: var(--cream);
    font-weight: normal;
    letter-spacing: 1px;
    padding: 10px;
    text-align: left;
    font-size: 14px;
  }
  table.board td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
  }
  tr.expand-row td {
    background: #faf8f1;
    font-size: 13px;
    color: #4a5468;
  }
  .pos { width: 44px; color: var(--gold); }
  .total { font-weight: bold; text-align: right; width: 70px; }
  .team-name { cursor: pointer; }
  .status-cut { color: #a33; font-size: 11px; letter-spacing: 1px; }
  .updated-note { font-size: 12px; color: #7a8296; margin-top: 8px; }

  /* ---------- team entry ---------- */
  .field-label {
    display: block;
    margin: 16px 0 6px 0;
    font-size: 14px;
    letter-spacing: 1px;
  }
  .text-input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #b9c0cf;
    border-radius: 6px;
    font-family: inherit;
  }
  .btn {
    margin-top: 18px;
    background: var(--navy);
    color: var(--cream);
    border: none;
    border-radius: 6px;
    padding: 13px 26px;
    font-size: 15px;
    font-family: inherit;
    letter-spacing: 1px;
    cursor: pointer;
    min-height: 46px;
  }
  .btn:active { opacity: 0.85; }
  .form-status { margin-top: 12px; font-size: 14px; }
  .form-status .ok { color: var(--ok); }
  .form-status .warn {
    color: var(--warn-text);
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 6px;
    padding: 8px 10px;
    display: block;
    white-space: pre-line;
  }

  /* ---------- commissioner ---------- */
  .comm-hint { font-size: 13px; color: #5a6478; margin: 0 0 10px 0; }
  .comm-textarea {
    width: 100%;
    min-height: 180px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    padding: 10px;
    border: 1px solid #b9c0cf;
    border-radius: 6px;
    resize: vertical;
  }

  /* ---------- golfer-select dropdown ---------- */
  .gs-wrap { position: relative; }
  .gs-input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #b9c0cf;
    border-radius: 6px;
    font-family: inherit;
  }
  .gs-list {
    position: absolute;
    z-index: 50;
    left: 0; right: 0;
    max-height: 280px;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #b9c0cf;
    border-top: none;
    border-radius: 0 0 6px 6px;
    -webkit-overflow-scrolling: touch;
  }
  .gs-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #eef0f5;
    min-height: 44px;
  }
  .gs-row:hover { background: #f2f4f9; }
  .gs-taken { opacity: 0.42; cursor: not-allowed; }
  .gs-name { color: var(--navy); }
  .gs-meta { font-size: 12px; color: #7a8296; margin-left: 12px; white-space: nowrap; }
  .gs-empty { padding: 12px; color: #7a8296; font-style: italic; }

  @media (max-width: 480px) {
    .logo-jug { height: 56px; }
    .logo-text h1 { font-size: 22px; letter-spacing: 2px; }
    nav button { padding: 12px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <img src="/images/claret-jug-navy-400.png" alt="Claret Jug" class="logo-jug">
    <div class="logo-text">
      <h1>THE OPEN POOL</h1>
      <div class="sub">Royal Birkdale &middot; July 16&ndash;19, 2026</div>
    </div>
  </div>
</header>

<nav>
  <button id="tab-btn-board" class="active">Leaderboard</button>
  <button id="tab-btn-team">Enter Team</button>
  <button id="tab-btn-comm">Commissioner</button>
</nav>

<main>

  <!-- ================= LEADERBOARD ================= -->
  <section id="tab-board" class="tab active">
    <h2>Standings</h2>
    <div id="board-container"><p>Loading standings&hellip;</p></div>
    <p class="updated-note" id="board-updated"></p>
  </section>

  <!-- ================= TEAM ENTRY ================= -->
  <section id="tab-team" class="tab">
    <h2>Enter Your Team</h2>
    <label class="field-label" for="team-name-input">TEAM NAME</label>
    <input id="team-name-input" class="text-input" type="text" placeholder="e.g. ShobeMeTheMoney" maxlength="40">
    <div id="picker-slots"></div>
    <button id="team-submit" class="btn">Submit Team</button>
    <div id="team-status" class="form-status"></div>
  </section>

  <!-- ================= COMMISSIONER ================= -->
  <section id="tab-comm" class="tab">
    <h2>Commissioner</h2>
    <div id="comm-locked">
      <label class="field-label" for="comm-code-input">COMMISSIONER CODE</label>
      <input id="comm-code-input" class="text-input" type="password" inputmode="numeric" placeholder="Enter code">
      <button id="comm-unlock" class="btn">Unlock</button>
      <div id="comm-unlock-status" class="form-status"></div>
    </div>
    <div id="comm-open" style="display:none;">
      <h2 style="border:none; font-size:18px; margin-bottom:4px;">Score Update</h2>
      <p class="comm-hint">
        Paste one golfer per line as <strong>Name,Score</strong>
        (e.g. Scottie Scheffler,-7 &nbsp;|&nbsp; Cameron Smith,E &nbsp;|&nbsp; Max Homa,CUT).
        Applies instantly.
      </p>
      <textarea id="comm-score-input" class="comm-textarea"
        placeholder="Scottie Scheffler,-7&#10;Rory McIlroy,-5&#10;Cameron Smith,E"></textarea>
      <button id="comm-apply-btn" class="btn">Apply Scores</button>
      <div id="comm-status" class="form-status"></div>
    </div>
  </section>

</main>

<script src="/golfers-data.js"></script>
<script src="/golfer-select.js"></script>
<script src="/commissioner-scores.js"></script>
<script>
(function () {
  "use strict";

  /* ================= CONFIG ================= */
  var ROSTER_SIZE = 5;          /* golfers per team */
  var TIER_SLOTS = null;        /* set to e.g. [1,2,3,4,5] to lock each
                                   slot to a tier once tiers are set in
                                   golfers-data.js; null = any golfer */

  /* ================= STATE ================= */
  var TEAMS = [];               /* [{teamName, golfers:[...]}] */
  var SCORES = {};              /* {name: {score, status, updatedAt}} */
  var commCode = null;
  var pickers = [];

  /* ================= API ================= */
  function apiGetState() {
    return fetch("/.netlify/functions/get-state")
      .then(function (r) {
        if (!r.ok) throw new Error("get-state " + r.status);
        return r.json();
      });
  }

  function apiSave(payload) {
    return fetch("/.netlify/functions/save-state", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(function (r) {
      return r.json().then(function (data) {
        if (!r.ok || data.ok !== true) {
          throw new Error(data.error || ("save failed " + r.status));
        }
        return data;
      });
    });
  }

  /* ================= TABS ================= */
  function showTab(name) {
    var tabs = ["board", "team", "comm"];
    var i;
    for (i = 0; i < tabs.length; i++) {
      document.getElementById("tab-" + tabs[i]).className =
        (tabs[i] === name) ? "tab active" : "tab";
      document.getElementById("tab-btn-" + tabs[i]).className =
        (tabs[i] === name) ? "active" : "";
    }
  }
  document.getElementById("tab-btn-board").addEventListener("click", function () { showTab("board"); });
  document.getElementById("tab-btn-team").addEventListener("click", function () { showTab("team"); });
  document.getElementById("tab-btn-comm").addEventListener("click", function () { showTab("comm"); });

  /* ================= LEADERBOARD ================= */
  function renderBoard() {
    var container = document.getElementById("board-container");
    if (TEAMS.length === 0) {
      container.innerHTML = "<p>No teams entered yet. Be the first on the Enter Team tab.</p>";
      return;
    }
    var standings = computeStandings(TEAMS, SCORES);
    var html = '<table class="board"><tr><th class="pos">POS</th><th>TEAM</th><th class="total">TOTAL</th></tr>';
    var i, j;
    for (i = 0; i < standings.length; i++) {
      var s = standings[i];
      html += '<tr><td class="pos">' + (i + 1) + '</td>' +
        '<td class="team-name" data-team="' + i + '">' + escapeHtml(s.teamName) + '</td>' +
        '<td class="total">' + formatToPar(s.total) + '</td></tr>';
      html += '<tr class="expand-row" id="expand-' + i + '" style="display:none;"><td></td><td colspan="2">';
      for (j = 0; j < s.golferDetails.length; j++) {
        var g = s.golferDetails[j];
        html += escapeHtml(g.name) + " &mdash; " + formatToPar(g.score);
        if (g.status === "cut" || g.status === "wd" || g.status === "dq") {
          html += ' <span class="status-cut">' + g.status.toUpperCase() + '</span>';
        }
        if (j < s.golferDetails.length - 1) html += "<br>";
      }
      html += '</td></tr>';
    }
    html += '</table>';
    container.innerHTML = html;

    var names = container.querySelectorAll(".team-name");
    for (i = 0; i < names.length; i++) {
      names[i].addEventListener("click", function () {
        var row = document.getElementById("expand-" + this.getAttribute("data-team"));
        row.style.display = (row.style.display === "none") ? "table-row" : "none";
      });
    }

    var latest = 0;
    var k;
    for (k in SCORES) {
      if (SCORES[k].updatedAt && SCORES[k].updatedAt > latest) latest = SCORES[k].updatedAt;
    }
    document.getElementById("board-updated").textContent =
      latest ? ("Scores last updated " + new Date(latest).toLocaleString()) : "No scores posted yet.";
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  /* ================= TEAM ENTRY ================= */
  function draftedNames() {
    var out = [];
    var i, j;
    for (i = 0; i < TEAMS.length; i++) {
      for (j = 0; j < TEAMS[i].golfers.length; j++) out.push(TEAMS[i].golfers[j]);
    }
    /* plus current in-progress picks so one form can't pick twice */
    for (i = 0; i < pickers.length; i++) {
      var v = pickers[i].getValue();
      if (v) out.push(v.name);
    }
    return out;
  }

  function refreshTaken() {
    var taken = draftedNames();
    var i;
    for (i = 0; i < pickers.length; i++) pickers[i].setTaken(taken);
  }

  function buildPickers() {
    var host = document.getElementById("picker-slots");
    host.innerHTML = "";
    pickers = [];
    var i;
    for (i = 0; i < ROSTER_SIZE; i++) {
      var label = document.createElement("label");
      label.className = "field-label";
      var tierFilter = null;
      if (TIER_SLOTS && typeof TIER_SLOTS[i] === "number") tierFilter = TIER_SLOTS[i];
      label.textContent = "GOLFER " + (i + 1) + (tierFilter !== null ? " (TIER " + tierFilter + ")" : "");
      host.appendChild(label);
      var slot = document.createElement("div");
      host.appendChild(slot);
      pickers.push(createGolferSelect({
        container: slot,
        takenNames: draftedNames(),
        tierFilter: tierFilter,
        onSelect: function () { refreshTaken(); }
      }));
    }
  }

  document.getElementById("team-submit").addEventListener("click", function () {
    var statusEl = document.getElementById("team-status");
    statusEl.innerHTML = "";
    var name = document.getElementById("team-name-input").value.trim();
    if (!name) {
      statusEl.innerHTML = '<span class="warn">Enter a team name.</span>';
      return;
    }
    var i;
    for (i = 0; i < TEAMS.length; i++) {
      if (TEAMS[i].teamName.toLowerCase() === name.toLowerCase()) {
        statusEl.innerHTML = '<span class="warn">That team name is already taken.</span>';
        return;
      }
    }
    var golfers = [];
    for (i = 0; i < pickers.length; i++) {
      var v = pickers[i].getValue();
      if (!v) {
        statusEl.innerHTML = '<span class="warn">Pick all ' + ROSTER_SIZE + ' golfers before submitting.</span>';
        return;
      }
      golfers.push(v.name);
    }
    var team = { teamName: name, golfers: golfers };
    statusEl.innerHTML = "Submitting&hellip;";
    apiSave({ action: "addTeam", team: team }).then(function (data) {
      TEAMS = data.teams;
      statusEl.innerHTML = '<span class="ok">Team submitted. Good luck!</span>';
      document.getElementById("team-name-input").value = "";
      buildPickers();
      renderBoard();
    }).catch(function (err) {
      statusEl.innerHTML = '<span class="warn">' + escapeHtml(err.message) + '</span>';
    });
  });

  /* ================= COMMISSIONER ================= */
  document.getElementById("comm-unlock").addEventListener("click", function () {
    var code = document.getElementById("comm-code-input").value.trim();
    var st = document.getElementById("comm-unlock-status");
    st.innerHTML = "Checking&hellip;";
    apiSave({ action: "checkCode", code: code }).then(function () {
      commCode = code;
      document.getElementById("comm-locked").style.display = "none";
      document.getElementById("comm-open").style.display = "block";
      st.innerHTML = "";
    }).catch(function () {
      st.innerHTML = '<span class="warn">Incorrect code.</span>';
    });
  });

  document.getElementById("comm-apply-btn").addEventListener("click", function () {
    var statusEl = document.getElementById("comm-status");
    var box = document.getElementById("comm-score-input");
    statusEl.innerHTML = "";
    var text = box.value;
    if (!text.trim()) return;

    var result = parseScoreInput(text, GOLFERS);

    apiGetState().then(function (state) {
      var updated = applyScores(state.scores || {}, result.updates);
      return apiSave({ action: "saveScores", code: commCode, scores: updated })
        .then(function () {
          SCORES = updated;
          TEAMS = state.teams || TEAMS;
          var msg = '<span class="ok">Applied ' + result.updates.length +
            ' score update' + (result.updates.length === 1 ? "" : "s") +
            ' at ' + new Date().toLocaleTimeString() + '.</span>';
          if (result.unmatched.length > 0) {
            msg += '<span class="warn">Unmatched (' + result.unmatched.length +
              '):\n' + escapeHtml(result.unmatched.join("\n")) + '</span>';
          }
          statusEl.innerHTML = msg;
          box.value = "";
          renderBoard();
        });
    }).catch(function (err) {
      statusEl.innerHTML = '<span class="warn">Save failed: ' +
        escapeHtml(err.message) + '. Scores were not saved - paste again.</span>';
    });
  });

  /* ================= INIT ================= */
  function init() {
    buildPickers();
    apiGetState().then(function (state) {
      TEAMS = state.teams || [];
      SCORES = state.scores || {};
      refreshTaken();
      renderBoard();
    }).catch(function () {
      document.getElementById("board-container").innerHTML =
        "<p>Could not load pool data. Refresh to try again.</p>";
    });
    /* light auto-refresh of standings every 90s during live play */
    setInterval(function () {
      apiGetState().then(function (state) {
        TEAMS = state.teams || TEAMS;
        SCORES = state.scores || SCORES;
        renderBoard();
        refreshTaken();
      }).catch(function () {});
    }, 90000);
  }
  init();
})();
</script>
</body>
</html>
